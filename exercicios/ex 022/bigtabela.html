<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grande tabela</title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
}

table{
    width: 500px;
}
td, h{
    border: 1px solid black;
    padding: 10px;
}

thead, tfoot{
    background-color: gray;
    color: white;
}




</style>



</head>
<body>
<h1> uso de tabelas grandes</h1>  
<table>
    <thead>

            <th>estado</th>

    </tr>
    </thead>
    <tbody>
        <tr>
            <td> são paulo</td>
            <td>45 919 049</td>
              </tr>
            <tr>
            <td> minas gerais</td>
    
            <td>21 168 94</td>
        </tr>
        <tr>
            <td>rio de janeiro</td>
            <td> 17 264 543</td>
        </tr>
      


    </tbody>
    <tfoot>
        <tr><th>total de habitantes</th>
            <td>0000</td>
        </tr>

    </tfoot>
    

</table>




</body>
</html>
